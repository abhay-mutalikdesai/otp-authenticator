name: 'Build Installers'
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g. 1.0.1)'
        required: true
        type: string
        default: '1.0.0'

jobs:
  build-tauri:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Update Version
        if: ${{ github.event.inputs.version != '' }}
        run: |
          node -e "const fs = require('fs'); let pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); pkg.version = '${{ github.event.inputs.version }}'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2)); let tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')); tauri.package.version = '${{ github.event.inputs.version }}'; fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauri, null, 2));"

      - name: install frontend dependencies
        run: npm install

      - name: Build Chrome Extension
        run: npm run build

      - name: Zip Extension (Windows)
        run: Compress-Archive -Path dist\* -DestinationPath otp-authenticator-browser-extension.zip

      - name: Build Desktop App
        uses: tauri-apps/tauri-action@v0

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v7
        with:
          name: otp-authenticator-browser-extension
          path: otp-authenticator-browser-extension.zip

      - name: Upload Desktop App (EXE) Artifact
        uses: actions/upload-artifact@v7
        with:
          name: otp-authenticator-windows-exe
          path: src-tauri\target\release\bundle\nsis\*.exe

      - name: Upload Desktop App (MSI) Artifact
        uses: actions/upload-artifact@v7
        with:
          name: otp-authenticator-windows-msi
          path: src-tauri\target\release\bundle\msi\*.msi
